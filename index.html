<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debt Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
    <button id="themeToggle" class="theme-toggle">🌙</button>
    <h1>💸 Debt Tracker</h1>
    <p>Мой путь к финансовой свободе</p>
</header>
        <section class="summary">
            <div class="card">
                <h3>Общий долг</h3>
                <span id="totalDebt">0 ₽</span>
            </div>
            <div class="card">
                <h3>Закрыто</h3>
                <span id="paidDebt">0 ₽</span>
            </div>
            <div class="card">
                <h3>Осталось</h3>
                <span id="remainingDebt">0 ₽</span>
            </div>
        </section>

        <section>
            <h2>🎯 Следующая цель</h2>
            <div class="goal-card">
                <h3 id="goalName"></h3>
                <p id="goalText"></p>
               <div class="progress-bar">
    <div id="progressFill" class="progress-fill">
        <span id="progressLabel" class="progress-label"></span>
    </div>
</div>
        </section>

     <section>
    <div class="section-header">
        <h2>💳 Мои долги</h2>
        <button id="addDebtBtn" class="add-btn">+ Добавить долг</button>
    </div>
    <div id="debtsContainer"></div>
</section>

      <section>
    <div class="history-header">
        <h2>🧾 История платежей</h2>
        <button id="undoBtn" class="undo-btn hidden">↩️ Отменить последний платёж</button>
    </div>
    <div id="historyContainer"></div>
</section>
    </div>

<div id="addDebtModal" class="modal-overlay hidden">
    <div class="modal">
        <h3>Новый долг</h3>
        <input type="text" id="newDebtName" placeholder="Название (например, Тинькофф)">
        <input type="number" id="newDebtAmount" placeholder="Сумма долга">
        <input type="number" id="newDebtRate" placeholder="Ставка, % (необязательно)">
        <input type="text" id="newDebtDeadline" placeholder="Дедлайн, например 31 августа (необязательно)">
        <div class="modal-buttons">
            <button id="cancelAddDebt" class="btn-secondary">Отмена</button>
            <button id="confirmAddDebt" class="btn-primary">Добавить</button>
        </div>
    </div>
</div>

    <div id="toast" class="toast hidden"></div>

    <script src="script.js"></script>
</body>
</html>
